services:
  - type: web
    name: memorymeet-backend
    runtime: python
    runtimeVersion: "3.12.7"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: HINDSIGHT_BASE_URL
        sync: false
      - key: HINDSIGHT_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./memorymeet.db
